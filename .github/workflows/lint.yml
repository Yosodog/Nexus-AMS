name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 7 * * *'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: pint

      - name: Run Pint
        run: pint

  phpunit-fast:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Copy environment
        run: cp .env.testing.example .env.testing

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run fast PHPUnit suite
        run: composer test:fast

  phpunit-integration:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    continue-on-error: true
    runs-on: ubuntu-latest
    needs: phpunit-fast
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: nexus_testing
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare integration environment
        run: |
          cp .env.testing.example .env.testing
          {
            echo "DB_CONNECTION=mysql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=3306"
            echo "DB_DATABASE=nexus_testing"
            echo "DB_USERNAME=root"
            echo "DB_PASSWORD=root"
          } >> .env.testing

      - name: Run integration suite
        run: composer test:integration

  browser-smoke:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    continue-on-error: true
    runs-on: ubuntu-latest
    needs: phpunit-fast
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci
          npx playwright install --with-deps chromium

      - name: Prepare test environment
        run: cp .env.testing.example .env.testing

      - name: Run browser smoke suite
        run: npm run test:browser
