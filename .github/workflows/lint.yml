name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 7 * * *'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Audit Composer dependencies
        run: composer audit --locked

      - name: Run Pint
        run: ./vendor/bin/pint

      - name: Verify Pint made no changes
        run: git diff --exit-code

  phpunit-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Copy environment
        run: cp .env.testing.example .env.testing

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run fast PHPUnit suite
        run: composer test:fast

  phpunit-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: phpunit-fast
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: nexus_testing
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare integration environment
        run: |
          cp .env.testing.example .env.testing
          {
            echo "DB_CONNECTION=mysql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=3306"
            echo "DB_DATABASE=nexus_testing"
            echo "DB_USERNAME=root"
            echo "DB_PASSWORD=root"
          } >> .env.testing

      - name: Run integration suite
        run: composer test:integration

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: phpunit-fast
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm ci
          npx playwright install --with-deps chromium

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Prepare test environment
        run: cp .env.testing.example .env.testing

      - name: Run browser smoke suite
        run: npm run test:browser
        env:
          PLAYWRIGHT_PHP_COMMAND: php
